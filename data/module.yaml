product:
  type: lib
  platforms: [jvm, android, iosArm64, iosSimulatorArm64, iosX64]

dependencies:
  - ../core
  - org.jetbrains.kotlinx:kotlinx-serialization-json:1.11.0
  - io.ktor:ktor-client-core:3.4.2
  - io.ktor:ktor-client-auth:3.4.2
  - io.ktor:ktor-client-content-negotiation:3.4.2
  - io.ktor:ktor-serialization-kotlinx-json:3.4.2
  - io.ktor:ktor-client-logging:3.4.2
  - io.insert-koin:koin-core:4.1.1
  - app.cash.sqldelight:runtime:2.3.2
  - app.cash.sqldelight:coroutines-extensions:2.3.2
  - org.jetbrains.kotlinx:kotlinx-datetime:0.7.1

dependencies@android:
  - io.ktor:ktor-client-okhttp:3.4.2
  - app.cash.sqldelight:android-driver:2.3.2
  - androidx.security:security-crypto:1.1.0-alpha06
  - io.github.kmpmail:kmp-imap:0.1.1
  - io.github.kmpmail:kmp-smtp:0.1.1

dependencies@iosArm64:
  - io.ktor:ktor-client-darwin:3.4.2
  - app.cash.sqldelight:native-driver:2.3.2
dependencies@iosSimulatorArm64:
  - io.ktor:ktor-client-darwin:3.4.2
  - app.cash.sqldelight:native-driver:2.3.2
dependencies@iosX64:
  - io.ktor:ktor-client-darwin:3.4.2
  - app.cash.sqldelight:native-driver:2.3.2

repositories:
  - url: https://maven.pkg.github.com/guettli/kmp-mail
    credentials:
      file: ../local.properties
      usernameKey: github.username
      passwordKey: github.token

dependencies@jvm:
  - io.ktor:ktor-client-cio:3.4.2
  - app.cash.sqldelight:sqlite-driver:2.3.2
  - io.github.kmpmail:kmp-imap:0.1.1
  - io.github.kmpmail:kmp-smtp:0.1.1

test-dependencies:
  - org.jetbrains.kotlin:kotlin-test:2.3.20

settings:
  kotlin:
    serialization: json
    freeCompilerArgs: ["-Xexpect-actual-classes"]

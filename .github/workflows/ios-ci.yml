name: iOS CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ios:
    name: Build & E2E test (macOS)
    runs-on: macos-latest
    env:
      E2E_URL: ${{ secrets.E2E_URL }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_USER: ${{ secrets.E2E_USER }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      GRADLE_CACHE_USER: ${{ secrets.GRADLE_CACHE_USER }}
      GRADLE_CACHE_TOKEN: ${{ secrets.GRADLE_CACHE_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install Amper
        run: |
          curl -sSfL \
            "https://packages.jetbrains.team/maven/p/amper/amper/org/jetbrains/amper/cli/0.10.0/cli-0.10.0-wrapper" \
            -o amper
          chmod +x amper
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Cache Amper distribution
        uses: actions/cache@v5
        with:
          path: ~/.amper
          key: amper-0.10.0-macos

      - name: Cache Gradle caches
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-macos-${{ hashFiles('**/module.yaml', 'libs.versions.toml') }}
          restore-keys: gradle-macos-

      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-macos-${{ hashFiles('**/module.yaml', 'libs.versions.toml') }}
          restore-keys: konan-macos-

      # Amper downloads Kotlin/Native prebuilt (~1.7 GB) and other toolchains here.
      # Without this cache, every run re-downloads them from Maven Central.
      - name: Cache Amper download cache
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/JetBrains/Amper/download.cache
          key: amper-downloads-macos-${{ hashFiles('**/module.yaml', 'libs.versions.toml') }}
          restore-keys: amper-downloads-macos-

      # Xcode's incremental build artifacts. Without this, xcodebuild rebuilds
      # everything from scratch on every run.
      - name: Cache Xcode DerivedData
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: xcode-derived-macos-${{ hashFiles('**/module.yaml', 'libs.versions.toml') }}
          restore-keys: xcode-derived-macos-

      - name: Configure Gradle remote build cache
        run: |
          mkdir -p ~/.gradle/init.d
          cp gradle/init.d/remote-cache.init.gradle.kts ~/.gradle/init.d/

      - name: Create local.properties for GitHub Packages credentials
        run: |
          echo "github.username=${{ github.actor }}" > local.properties
          echo "github.token=${{ secrets.GITHUB_TOKEN }}" >> local.properties

      - name: Build iOS app
        run: amper build -m ios-app
        env:
          GRADLE_OPTS: "-Dorg.gradle.caching=true"

      - name: Run E2E tests
        run: amper test -m data -p jvm --include-classes "de.sharedinbox.data.E2eRemoteIntegrationTest"

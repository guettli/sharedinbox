name: iOS CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ios:
    name: Build & E2E test (macOS)
    runs-on: macos-latest
    env:
      E2E_URL: ${{ secrets.E2E_URL }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_USER: ${{ secrets.E2E_USER }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      GRADLE_CACHE_USER: ${{ secrets.GRADLE_CACHE_USER }}
      GRADLE_CACHE_TOKEN: ${{ secrets.GRADLE_CACHE_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install Amper
        run: |
          curl -sSfL \
            "https://packages.jetbrains.team/maven/p/amper/amper/org/jetbrains/amper/cli/0.10.0/cli-0.10.0-wrapper" \
            -o amper
          chmod +x amper
          echo "$PWD" >> "$GITHUB_PATH"

      # On macOS, amper stores its distribution (CLI JAR + bundled JRE) and all
      # downloaded toolchain artifacts under ~/Library/Caches/JetBrains/Amper.
      # Caching this directory avoids re-downloading ~250 MB of K/N toolchain on
      # every run. The key includes the dep hash so new dependencies trigger a
      # fresh download while restore-keys fall back to the previous version.
      - name: Cache Amper (distribution + downloads)
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/JetBrains/Amper
          key: amper-macos-${{ hashFiles('**/module.yaml', 'libs.versions.toml') }}
          restore-keys: amper-macos-

      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-macos-${{ hashFiles('**/module.yaml', 'libs.versions.toml') }}
          restore-keys: konan-macos-

      - name: Configure Gradle remote build cache
        run: |
          mkdir -p ~/.gradle/init.d
          cp gradle/init.d/remote-cache.init.gradle.kts ~/.gradle/init.d/

      - name: Create local.properties for GitHub Packages credentials
        run: |
          echo "github.username=${{ github.actor }}" > local.properties
          echo "github.token=${{ secrets.GITHUB_TOKEN }}" >> local.properties

      - name: Build iOS app
        run: amper build -m ios-app
        env:
          GRADLE_OPTS: "-Dorg.gradle.caching=true"

      - name: Run E2E tests
        run: amper test -m data -p jvm --include-classes "de.sharedinbox.data.E2eRemoteIntegrationTest"

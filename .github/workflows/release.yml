name: Release

# Triggered by pushing a version tag, e.g. git tag v0.2.0 && git push --tags
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # needed to create the GitHub release and upload assets

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            pkg-type: deb
            pkg-glob: '*.deb'
          - os: macos-latest
            label: macos
            pkg-type: dmg
            pkg-glob: '*.dmg'
          - os: windows-latest
            label: windows
            pkg-type: msi
            pkg-glob: '*.msi'

    steps:
      - uses: actions/checkout@v4

      # ── Java ────────────────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # ── Amper ───────────────────────────────────────────────────────────────
      - name: Install Amper (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          curl -sSfL \
            "https://packages.jetbrains.team/maven/p/amper/amper/org/jetbrains/amper/cli/0.10.0/cli-0.10.0-wrapper" \
            -o amper
          chmod +x amper
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Install Amper (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://packages.jetbrains.team/maven/p/amper/amper/org/jetbrains/amper/cli/0.10.0/cli-0.10.0-wrapper.bat" `
            -OutFile amper.bat
          "$PWD" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # ── Caches ──────────────────────────────────────────────────────────────
      - name: Cache Amper distribution
        uses: actions/cache@v4
        with:
          path: ~/.amper
          key: amper-0.10.0-${{ matrix.label }}

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ matrix.label }}-${{ hashFiles('**/module.yaml', 'libs.versions.toml') }}
          restore-keys: gradle-${{ matrix.label }}-

      # ── WiX (Windows .msi only) ─────────────────────────────────────────────
      - name: Install WiX Toolset
        if: matrix.label == 'windows'
        run: choco install wixtoolset --yes --no-progress

      # ── Version ─────────────────────────────────────────────────────────────
      - name: Extract version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build executable JAR (Linux / macOS)
        if: runner.os != 'Windows'
        run: amper package -m desktop-app -p jvm --format=executable-jar

      - name: Build executable JAR (Windows)
        if: runner.os == 'Windows'
        run: amper.bat package -m desktop-app -p jvm --format=executable-jar
        shell: cmd

      # ── Rename JAR ──────────────────────────────────────────────────────────
      - name: Rename JAR
        shell: bash
        run: |
          cp \
            "build/tasks/_desktop-app_executableJarJvm/desktop-app-jvm-executable.jar" \
            "sharedinbox-${{ steps.ver.outputs.version }}-${{ matrix.label }}.jar"

      # ── jpackage native installer ────────────────────────────────────────────
      - name: Create installer with jpackage
        shell: bash
        run: |
          mkdir jpackage-input
          cp "sharedinbox-${{ steps.ver.outputs.version }}-${{ matrix.label }}.jar" jpackage-input/

          EXTRA_ARGS=""
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            EXTRA_ARGS="--linux-package-name sharedinbox --linux-app-category Network"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            EXTRA_ARGS="--mac-package-identifier de.sharedinbox.app"
          fi

          jpackage \
            --input jpackage-input \
            --main-jar "sharedinbox-${{ steps.ver.outputs.version }}-${{ matrix.label }}.jar" \
            --name SharedInbox \
            --app-version "${{ steps.ver.outputs.version }}" \
            --vendor "SharedInbox Project" \
            --description "JMAP email client" \
            --type "${{ matrix.pkg-type }}" \
            --dest dist \
            $EXTRA_ARGS

      # ── Upload to GitHub Release ─────────────────────────────────────────────
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            sharedinbox-${{ steps.ver.outputs.version }}-${{ matrix.label }}.jar
            dist/${{ matrix.pkg-glob }}

name: CI

on:
  push:
    branches: [main]   # tag pushes don't match branch filters, so no infinite loop
  pull_request:

jobs:
  test:
    name: Test (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle caches
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-linux-${{ hashFiles('coverage/build.gradle.kts') }}
          restore-keys: gradle-linux-

      - name: Install Amper
        run: |
          curl -sSfL \
            "https://packages.jetbrains.team/maven/p/amper/amper/org/jetbrains/amper/cli/0.10.0/cli-0.10.0-wrapper" \
            -o amper
          chmod +x amper
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Cache Amper distribution
        uses: actions/cache@v5
        with:
          path: ~/.amper
          key: amper-0.10.0-linux

      - name: Compile iOS targets (catches KMP errors early)
        run: amper build -m data -m ui -p iosX64

      - name: Run tests and verify coverage (≥70%)
        run: ./gradlew --project-dir coverage test koverVerify

  bump-patch:
    name: Bump patch version
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # need full tag history

      - name: Compute next patch tag
        id: tag
        run: |
          latest=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [[ -z "$latest" ]]; then
            next="v0.1.0"
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      - name: Push tag
        run: |
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

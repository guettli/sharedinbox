# Minimal Stalwart Mail configuration for local development and integration tests.
#
# Start:  stalwart-mail --config stalwart-dev/config.toml
# Check:  curl http://localhost:8080/.well-known/jmap
#
# HTTP only — localhost testing, no TLS.
# Two test accounts (alice, bob) for multi-account sync tests.
# Data stored in /tmp/stalwart-dev (safe to delete between test runs).

[server]
hostname = "localhost"

[[server.listener]]
id       = "jmap"
bind     = ["127.0.0.1:8080"]
protocol = "http"

[store."db"]
type = "sqlite"
path = "/tmp/stalwart-dev/data.sqlite"

[storage]
data      = "db"
fts       = "db"
blob      = "db"
lookup    = "db"
directory = "memory"

[directory."memory"]
type = "memory"

[[directory."memory".principals]]
type   = "individual"
name   = "alice"
secret = "secret"
email  = ["alice@localhost"]

[[directory."memory".principals]]
type   = "individual"
name   = "bob"
secret = "secret"
email  = ["bob@localhost"]

[authentication.fallback-admin]
user   = "admin"
secret = "admin"
